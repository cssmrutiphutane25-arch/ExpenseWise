<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;

        }

        body {
            background: radial-gradient(circle, #e9f1fadb, transparent 116%);
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 500;
            text-align: center;
            box-shadow: 2px 10px 10px rgba(51, 50, 50, 0.041);
            line-height: 2em;
            margin-bottom: 40px;
            margin-top: 30px;
            
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 40px;
            
        }

        form {
            width: auto;
            margin-left: 15px;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 450px;
            text-align: center;
            max-width: 600px;
            box-shadow: 7px 12px 13px rgb(0 0 0 / 12%);
            gap: 35px;
            padding-bottom: 50px;
        }

        #select-time {
            font-size: larger;
            font-weight: bold;
            line-height: 8vb;
            margin-left: 30px;

        }

        .form-list {
            display: flex;
            flex-direction: column;
            justify-content: left;
            text-align: left;
            width: max-content;
            margin-left: 30px;
        }

        #time-periods {
            font-size: larger;
            font-weight: 400;
        }

        #radio {
            display: flex;
            flex-direction: row;
            gap: 25px;
            margin-left: 30px;
        }

        #radio-design {
            display: flex;
            flex-direction: row;
            gap: 5px;
        }

        #expense-title {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: larger;
            font-weight: bolder;
        }

        #select-cat {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: larger;
            font-weight: bolder;
        }

        #enter-amount {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: larger;
            font-weight: bolder;
        }

        #enter-date {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: larger;
            font-weight: bolder;
        }

        #enter-description {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: larger;
            font-weight: bolder;
        }

        #click-me {
            display: flex;
            flex-direction: row;
            gap: 45px;
            font-size: larger;
            font-weight: bolder;
        }

        button {
            display: flex;
            flex-direction: row;
            padding: 10px;
            font-size: medium;
            font-weight: 700;
            font-family: 'Times New Roman', Times, serif;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            background-color: #2563ebad;
        }

        button:hover {
            background-color: #1D4ED8;
        }

        #title {
            height: 35px;
            width: 300px;
        }

        #amount {
            height: 35px;
            width: 300px;
        }

        #description {
            height: 35px;
            width: 300px;
        }

        #categorie {
            height: 35px;
            width: 155px;
        }

        #date {
            height: 35px;
            width: 135px;
        }
    </style>
</head>

<body>
    <h1>Add Expense</h1>
    <h2>Fill in your expense details to keep track of your spending.</h2>
    <form action="dashboard.html">
        <div class="form-container">
            <div>
                <span id="select-time">Select Time Period</span><br>
                <div id="radio">
                    <div id="radio-design">
                        <input type="radio" name="time-period" id="time-period" required>
                        <label for="time-period" id="time-periods">1 Week</label>
                    </div>

                    <div id="radio-design">
                        <input type="radio" name="time-period" id="time-period">
                        <label for="time-period" id="time-periods">2 Week</label>
                    </div>

                    <div id="radio-design">
                        <input type="radio" name="time-period" id="time-period">
                        <label for="time-period" id="time-periods">3 Week</label>
                    </div>

                    <div id="radio-design">
                        <input type="radio" name="time-period" id="time-period">
                        <label for="time-period" id="time-periods">1 Month</label>
                    </div>
                </div>
            </div>
            <div class="form-list">
                <div id="expense-title">
                    <label for="title">Expense Title</label>
                    <input type="text" id="title" placeholder=" e.g. Grocery Shopping" required>
                </div>
            </div>
            <div class="form-list">
                <div id="select-cat">
                    <label for="categorie">Select Categorie</label>
                    <select name="categorie" id="categorie" required>
                        <option value="" disabled selected hidden>Select Category</option>
                        <option value="food">🍔 Food</option>
                        <option value="travel">🚌 Travel</option>
                        <option value="shopping">🛍 Shopping</option>
                        <option value="bills">💡 Bills</option>
                        <option value="entertainment">🎬 Entertainment</option>
                        <option value="healthcare">🩺 Healthcare</option>
                        <option value="education">📚 Education</option>
                        <option value="others">🎁 Others</option>
                    </select>
                </div>
            </div>
            <div class="form-list">
                <div id="enter-amount">
                    <label for="amount">Amount</label>
                    <input type="text" name="amount" id="amount" required>
                </div>
            </div>
            <div class="form-list">
                <div id="enter-date">
                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" required>
                </div>
            </div>
            <div class="form-list">
                <div id="enter-description">
                    <label for="description">Description</label>
                    <input type="text" name="description" id="description" required>
                </div>
            </div>
            <div class="form-list">
                <div id="click-me">
                    <button type="reset">+ Add Expense</button>
                    <button type="submit">Finish & Generate Dashboard</button>
                </div>
            </div>
        </div>
    </form>
</body>

</html>
