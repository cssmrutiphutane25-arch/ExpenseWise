<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f9fd 0%, #f4f9fe 100%);

        }

        .signup-page {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 120px;

            min-height: 100vh;
        }

        .illustration img {

            width: 500px;
            height: auto;

        }

        .signup-container {
            width: 430px;

            padding: 40px;

            border-radius: 20px;

            background: linear-gradient(to right, #F8FAFC, #EEF6FF);

            box-shadow: 0 15px 40px rgba(0, 0, 0, .08);
        }

        button {
            width: 100%;

            padding: 12px;

            font-size: 18px;

            border-radius: 12px;

            background: #2563EB;
            font-weight: bold;

        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
            font-family: 'Times New Roman', Times, serif;
        }

        input {
            width: 100%;

            padding: 15px;

            margin-top: 8px;

            margin-bottom: 18px;

            margin-left: 0;

            border-radius: 12px;

            border: 1px solid #D1D5DB;

            font-size: 16px;


        }

        label {
            margin-left: 0;

            font-weight: 600;
        }

        a {
            color: #2563EB;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .terms {
            justify-content: flex-start;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-left: -14px;
        }

        .terms label {
            font-size: 18px;
            cursor: pointer;
        }

        #checkbox {
            margin-left: 7px;
        }

        p {
            text-align: center;
        }

        /* Popup Background */

        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            justify-content: center;
            align-items: center;
            z-index: 999;

        }

        /* Popup Box */

        .popup-content {
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
            animation: popup .3s ease;
        }

        .popup-content h2 {
            color: #2563EB;
            margin-bottom: 20px;
        }

        .popup-content p {
            color: #555;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .popup-content button {
            margin-top: 15px;
            padding: 12px 28px;
            border: none;
            background: #2563EB;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        .popup-content button:hover {
            background: #1d4ed8;
        }

        @keyframes popup {
            from {
                transform: scale(.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }

        }
    </style>

</head>

<body>
    <div class="signup-page">

        <div class="illustration">
            <img src="Money income-bro.png" alt="Signup Illustration">
        </div>
        <div class="signup-page">
            <div class="signup-container">
                <h1>Create Your ExpenseWise Account</h1>
                <div>
                    <label for="fullname">Full Name</label>
                    <input type="text" name="fullname" id="full-name" autocomplete="on" autofocus>
                </div>
                <div>
                    <label for="email-address">Email Address</label>
                    <input type="text" name="email-address" id="email-add" autocomplete="on" autofocus>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" autofocus>
                </div>
                <div>
                    <label for="c-password">Confirm Password</label>
                    <input type="password" name="c-password" id="c-password" autofocus>
                </div>
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" id="checkbox">I agree to the Terms & Conditions</label>
                </div>
                <button type="button" onclick="showPopup()">
                    Create Account
                </button>
                <p>Already have an account <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <div id="welcomePopup" class="popup">

        <div class="popup-content">

            <h2>🎉 Account Created Successfully!</h2>

            <p>
                Before viewing your dashboard, please add your expenses.
            </p>

            <p>
                Your dashboard will be generated automatically after you save your expenses.
            </p>

            <button onclick="goToExpensePage()">
                Add Expenses
            </button>

        </div>
    </div>
</body>
<script>
    function showPopup() {
        document.getElementById("welcomePopup").style.display = "flex";
    }

    // Redirect to Add Expense page

    function goToExpensePage() {
        window.location.href = "AddExpense.html";
    }
</script>

</html>
