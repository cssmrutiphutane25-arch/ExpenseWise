<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f9fd 0%, #f4f9fe 100%);
        }

        img {
            width: 200px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 60px auto 0 auto;

        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50vh;
        }

        .login-container {
            background: linear-gradient(to right,
                    #F8FAFC,
                    #EEF6FF);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            width: 420px;
            margin: 75px auto;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #4B5563;
            margin-bottom: 10px;
            font-family: 'Times New Roman', Times, serif;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 0.2;
            font-family: 'Times New Roman', Times, serif;
        }

        input {
            font-size: 17px;
            font-weight: 500;
            border-radius: 10px;
            padding: 10px;
            width: 265px;
            height: 30px;
            font-family: 'Times New Roman', Times, serif;
            box-shadow: 0 8px 20px rgba(15, 14, 14, 0.08);
        }

        button {
            margin: auto;
            background-color: #2563EB;
            color: white;
            border: none;
            padding: 7px;
            font-size: 22px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            transform: scale(1.03);
            width: 150px;
        }

        #login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        #forget {
            font-size: 15px;
        }

        a {
            color: #2563EB;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <img src="logo-removebg-preview.png" alt="logo img">
    <div class="login-page">
        <div class="login-container">
            <h1>Welcome Back</h1>
            <p>Sign in to continue managing your expenses.</p>
            <div>
                <input type="text" name="email-address" id="email-add" placeholder="📧 Email Address" autocomplete="on"
                    autofocus>
            </div>
            <div>
                <input type="password" name="password" id="password" placeholder="🔒 Password" autofocus>
            </div>
            <a href="" id="forget">Forgot Password?</a>
            <p>Don't have an account? <a href="signup.html">Create one</a></p>
            <button>Login</button>
        </div>
    </div>
</body>

</html>
